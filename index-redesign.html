<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Values Card Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:          #F5F1E9;
            --surface:     #FDFAF5;
            --surface-alt: #EAE6DC;
            --border:      #DDD8CE;
            --border-mid:  #C4BCAF;
            --text-1:      #1A1714;
            --text-2:      #6A6460;
            --text-3:      #A89F97;
            --accent:      #A86535;
            --accent-pale: #F4EDE3;
            --ink:         #1E1812;
            --ink-2:       #2E2318;
            --ink-border:  #38281E;
            --ink-text:    #EDE7DF;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-1);
        }

        .hidden { display: none !important; }

        /* ════════════════════════════════
           INTRO SCREEN
        ════════════════════════════════ */
        #intro {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 28px;
            background: var(--surface);
        }

        .intro-eyebrow {
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-weight: 600;
            color: var(--text-3);
            margin-bottom: 18px;
        }

        .intro-title {
            font-family: 'Lora', Georgia, serif;
            font-size: clamp(30px, 6vw, 46px);
            font-weight: 600;
            color: var(--text-1);
            text-align: center;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .intro-sub {
            font-size: 15px;
            color: var(--text-2);
            text-align: center;
            line-height: 1.65;
            max-width: 360px;
            margin-bottom: 44px;
        }

        .intro-start {
            padding: 14px 52px;
            background: var(--ink);
            color: var(--ink-text);
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            letter-spacing: 0.2px;
            transition: background 0.15s, transform 0.1s;
        }

        .intro-start:hover {
            background: var(--ink-2);
            transform: translateY(-1px);
        }

        /* ════════════════════════════════
           APP SHELL
        ════════════════════════════════ */
        #app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-width: 860px) {
            #app {
                max-width: 860px;
                margin: 0 auto;
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
            }
        }

        /* Header */
        .app-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            height: 52px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }

        .app-title {
            font-family: 'Lora', Georgia, serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-1);
        }

        .step-dots {
            display: flex;
            gap: 8px;
            justify-self: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border-mid);
            transition: background 0.25s, transform 0.25s;
        }

        .dot.active {
            background: var(--accent);
            transform: scale(1.35);
        }

        .back-btn {
            justify-self: end;
            background: none;
            border: 1px solid var(--border-mid);
            color: var(--text-2);
            border-radius: 7px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .back-btn:hover {
            background: rgba(0,0,0,0.04);
            color: var(--text-1);
        }

        /* Thin progress line under header */
        .progress-track {
            height: 2px;
            background: var(--border);
            flex-shrink: 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #C47A42);
            transition: width 0.35s ease;
            width: 0%;
        }

        /* Step instruction banner */
        .step-banner {
            background: var(--accent-pale);
            border-bottom: 1px solid #E0D0BE;
            padding: 11px 20px;
            flex-shrink: 0;
        }

        .step-banner-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 3px;
        }

        .step-banner-text {
            font-size: 13px;
            color: var(--text-2);
            line-height: 1.5;
        }

        .step-banner-text strong { color: var(--text-1); font-weight: 600; }

        /* Scrollable content */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        @media (min-width: 600px) {
            .content { padding: 28px 32px; }
        }

        /* Sticky footer */
        .app-footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 14px 20px 18px;
            flex-shrink: 0;
        }

        .footer-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin-bottom: 10px;
        }

        .footer-count {
            font-family: 'Lora', Georgia, serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--text-1);
            transition: color 0.2s;
        }

        .footer-count.complete { color: var(--accent); }

        .footer-denom {
            font-size: 14px;
            color: var(--text-3);
        }

        .footer-msg {
            font-size: 12px;
            color: var(--text-2);
            margin-left: 4px;
        }

        .footer-limit {
            min-height: 14px;
            font-size: 11.5px;
            color: #B04A25;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .next-btn {
            width: 100%;
            padding: 13px;
            background: var(--ink);
            color: var(--ink-text);
            border: none;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            letter-spacing: 0.2px;
            transition: background 0.15s, transform 0.1s, opacity 0.2s;
        }

        .next-btn:hover:not(:disabled) {
            background: var(--ink-2);
            transform: translateY(-1px);
        }

        .next-btn:disabled { opacity: 0.28; cursor: not-allowed; }

        .footer-hint {
            font-size: 10.5px;
            color: var(--text-3);
            text-align: center;
            margin-top: 7px;
        }

        /* ════════════════════════════════
           CHIPS  (Steps 1 & 2)
        ════════════════════════════════ */
        .chips-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }

        .chip {
            width: 144px;           /* wide enough for "Interconnectedness" */
            white-space: nowrap;
            border-radius: 8px;
            font-size: 11.5px;
            font-weight: 500;
            line-height: 1;
            text-align: center;
            padding: 9px 10px;
            cursor: pointer;
            user-select: none;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-1);
            position: relative;
            transition: transform 0.12s, background 0.12s, border-color 0.12s,
                        color 0.12s, box-shadow 0.12s, opacity 0.12s;
        }

        .chip:hover {
            border-color: var(--border-mid);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(60,40,20,0.10);
        }

        .chip:active { transform: translateY(0); }

        /* Selected / kept */
        .chip.selected {
            background: var(--ink);
            border-color: var(--ink-border);
            color: var(--ink-text);
            box-shadow: 0 2px 8px rgba(30,24,18,0.22);
        }

        .chip.selected:hover {
            background: var(--ink-2);
            box-shadow: 0 4px 12px rgba(30,24,18,0.32);
        }

        /* Discarded (step 2) */
        .chip.discarded {
            background: var(--bg);
            border-color: var(--border);
            color: var(--text-3);
            text-decoration: line-through;
            text-decoration-color: var(--border-mid);
            opacity: 0.7;
        }

        .chip.discarded:hover {
            opacity: 1;
            border-color: var(--border-mid);
            text-decoration: none;
            color: var(--text-2);
            transform: translateY(-1px);
        }

        /* Custom add chip */
        .chip.add-custom {
            border-style: dashed;
            border-color: var(--border-mid);
            background: transparent;
            color: var(--text-3);
            font-size: 11px;
        }

        .chip.add-custom:hover {
            border-color: var(--text-3);
            color: var(--text-2);
            background: var(--surface);
        }

        /* Edit pencil on custom chips */
        .chip-edit {
            position: absolute;
            top: 2px; right: 3px;
            background: none; border: none;
            font-size: 9px;
            cursor: pointer;
            color: rgba(0,0,0,0.18);
            padding: 1px;
            line-height: 1;
            transition: color 0.15s;
        }

        .chip-edit:hover { color: rgba(0,0,0,0.55); }
        .chip.selected .chip-edit { color: rgba(237,231,223,0.28); }
        .chip.selected .chip-edit:hover { color: rgba(237,231,223,0.72); }

        @keyframes chipIn {
            from { opacity: 0; transform: scale(0.88); }
            to   { opacity: 1; transform: scale(1); }
        }
        .chip-anim { animation: chipIn 0.13s ease forwards; }

        /* ════════════════════════════════
           SECTION LABELS
        ════════════════════════════════ */
        .section-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.8px;
            font-weight: 600;
            color: var(--text-3);
            margin-bottom: 10px;
        }

        .section-label + .section-label { margin-top: 20px; }

        /* ════════════════════════════════
           STEP 3  –  COMPARISON
        ════════════════════════════════ */
        .compare-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .compare-pair {
            display: flex;
            gap: 14px;
            align-items: center;
            width: 100%;
            max-width: 380px;
            margin-bottom: 28px;
        }

        .cmp-card {
            flex: 1;
            aspect-ratio: 3 / 4;
            max-height: 230px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            box-shadow: 0 4px 16px rgba(60,40,20,0.09);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 14px 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
        }

        .cmp-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 30px rgba(60,40,20,0.14);
            border-color: var(--border-mid);
        }

        .cmp-inner {
            position: absolute;
            inset: 5px;
            border-radius: 8px;
            border: 1px solid rgba(60,40,20,0.04);
        }

        .cmp-corner {
            position: absolute;
            font-size: 7px;
            color: #CFC8BE;
        }

        .cmp-corner.tl { top: 8px; left: 9px; }
        .cmp-corner.br { bottom: 8px; right: 9px; transform: rotate(180deg); }

        .cmp-name {
            font-family: 'Lora', Georgia, serif;
            font-size: clamp(16px, 3.5vw, 22px);
            font-weight: 600;
            color: var(--text-1);
            line-height: 1.2;
            z-index: 1;
            position: relative;
        }

        .cmp-vs {
            font-family: 'Lora', Georgia, serif;
            font-style: italic;
            font-size: 12px;
            color: var(--text-3);
            flex-shrink: 0;
            user-select: none;
        }

        /* Waiting pool pills */
        .pill-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            width: 100%;
            max-width: 380px;
            margin-bottom: 6px;
        }

        .pill {
            padding: 5px 11px;
            border-radius: 20px;
            font-size: 11.5px;
            font-weight: 500;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-3);
        }

        .pill.finalist {
            background: var(--ink);
            border-color: var(--ink-border);
            color: var(--ink-text);
            font-weight: 600;
        }

        .pill.selectable {
            background: var(--surface);
            color: var(--text-2);
            cursor: pointer;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .pill.selectable:hover { border-color: var(--border-mid); }

        .pill.selectable.ring,
        .pill.finalist.ring {
            box-shadow: 0 0 0 2.5px var(--accent);
            border-color: var(--accent);
        }

        /* ═════════════��══════════════════
           STEP 4  –  PYRAMID
        ════════════════════════════════ */
        .pyramid-section {
            margin-top: 8px;
        }

        .pyramid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 9px;
            padding: 8px 0 16px;
        }

        .pyr-row { display: flex; gap: 9px; }

        .pyr-slot {
            width: 86px;
            height: 86px;
            border-radius: 10px;
            border: 1.5px dashed var(--border-mid);
            background: rgba(253,250,245,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            user-select: none;
            transition: border-color 0.15s, background 0.15s, transform 0.15s, box-shadow 0.15s;
        }

        @media (min-width: 500px) {
            .pyr-slot { width: 100px; height: 100px; }
        }

        .pyr-slot:not(.has-card):hover {
            border-color: var(--text-3);
            background: rgba(253,250,245,0.6);
        }

        .pyr-slot.pending-target {
            border-color: var(--accent);
            background: rgba(168,101,53,0.08);
        }

        .pyr-slot.pending-target:hover {
            background: rgba(168,101,53,0.14);
        }

        .pyr-slot.has-card {
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(60,40,20,0.08);
        }

        .pyr-slot.has-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(60,40,20,0.12);
            border-color: var(--border-mid);
        }

        .pyr-slot.swap-ready { border-style: solid; border-color: var(--accent); }
        .pyr-slot.drag-over {
            border-color: var(--accent) !important;
            border-style: solid !important;
            background: rgba(168,101,53,0.10) !important;
        }

        .pyr-slot-num {
            font-family: 'Lora', Georgia, serif;
            font-size: 24px;
            font-weight: 400;
            color: var(--border);
        }

        .pyr-inner {
            position: absolute;
            inset: 4px;
            border-radius: 7px;
            border: 1px solid rgba(60,40,20,0.04);
            pointer-events: none;
        }

        .pyr-corner {
            position: absolute;
            font-size: 6px;
            color: #CFC8BE;
        }

        .pyr-corner.tl { top: 6px; left: 7px; }
        .pyr-corner.br { bottom: 6px; right: 7px; transform: rotate(180deg); }

        .pyr-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-1);
            line-height: 1.25;
            z-index: 1;
            padding: 0 5px;
        }

        /* Unplaced value pills (step 4) */
        .unplaced-group {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 20px;
        }

        .unplaced-pill {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text-1);
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
        }

        .unplaced-pill:hover {
            border-color: var(--border-mid);
            transform: translateY(-1px);
        }

        .unplaced-pill.ring {
            box-shadow: 0 0 0 2.5px var(--accent);
            border-color: var(--accent);
        }

        /* ════════════════════════════════
           COMPLETION SCREEN
        ════════════════════════════════ */
        .completion {
            padding: 12px 0 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .completion-title {
            font-family: 'Lora', Georgia, serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--text-1);
            text-align: center;
            margin-bottom: 28px;
        }

        .completion-list {
            display: flex;
            flex-direction: column;
            gap: 9px;
            width: 100%;
            max-width: 340px;
        }

        .completion-item {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 18px;
        }

        .completion-rank {
            font-family: 'Lora', Georgia, serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--accent);
            width: 22px;
            text-align: center;
            flex-shrink: 0;
        }

        .completion-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-1);
        }

        /* ════════════════════════════════
           MISC
        ════════════════════════════════ */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }
    </style>
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<!-- ══════════════════════════════════════
     INTRO SCREEN
══════════════════════════════════════ -->
<div id="intro">
    <p class="intro-eyebrow">A reflective exercise</p>
    <h1 class="intro-title">What do you<br>value most?</h1>
    <p class="intro-sub">A four-step card game to uncover and rank the values that define who you are.</p>

    <button class="intro-start" id="startBtn">Begin →</button>
</div>

<!-- ══════════════════════════════════════
     MAIN APP
══════════════════════════════════════ -->
<div id="app" class="hidden">

    <header class="app-header">
        <span class="app-title">Values</span>
        <div class="step-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <button class="back-btn hidden" id="backBtn">← Back</button>
    </header>

    <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="step-banner">
        <div class="step-banner-label" id="bannerLabel"></div>
        <div class="step-banner-text"  id="bannerText"></div>
    </div>

    <div class="content" id="content"></div>

    <footer class="app-footer">
        <div class="footer-limit" id="limitMsg"></div>
        <div class="footer-row">
            <span class="footer-count" id="countNum">0</span>
            <span class="footer-denom" id="countDenom">/ 24</span>
            <span class="footer-msg"   id="footerMsg"></span>
        </div>
        <button class="next-btn" id="nextBtn" disabled>Continue to Step 2 →</button>
        <p class="footer-hint" id="hint">Select 24 values to continue</p>
    </footer>

</div>

<script>
/* ════════════════════════════════════════════
   DATA
════════════════════════════════════════════ */
const VALUES = [
    "Acceptance","Achievement","Action","Adaptability","Adventure","Authority","Autonomy",
    "Beauty","Belonging","Caring","Certainty","Challenge","Collaboration","Comfort",
    "Commitment","Community","Compassion","Control","Courage","Courtesy","Creativity",
    "Curiosity","Decisiveness","Dependability","Dignity","Diversity","Duty",
    "Efficiency","Equality","Equity","Excellence","Excitement",
    "Faith","Fame","Family","Forgiveness","Freedom","Friendship","Fulfillment","Fun",
    "Generosity","Genuineness","Gratitude","Happiness","Health","Honesty","Humility",
    "Identity","Independence","Innovation","Integrity","Interconnectedness","Intimacy",
    "Justice","Knowledge","Life","Love","Loyalty","Merit","Moderation",
    "Order","Passion","Patience","Patriotism","Pleasure","Popularity","Power",
    "Practicality","Prosperity","Rationality","Recognition","Respect",
    "Security","Service","Solitude","Spirituality","Stability","Success",
    "Sustainability","Tolerance","Tradition","Trust","Wealth","Wisdom"
];

const CUSTOM_IDS  = ['__c0','__c1','__c2','__c3','__c4'];
const customLabels = new Map();

function isCustom(v)   { return v.startsWith('__c'); }
function label(v)      { return isCustom(v) ? (customLabels.get(v) || '') : v; }
function allValues()   { return [...VALUES, ...CUSTOM_IDS.filter(id => customLabels.has(id))]; }

/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
let step      = 1;
let selected  = new Set();
let kept      = new Set();
let discarded = new Set();
let pool      = [];
let finalists = new Set();
let pairA = null, pairB = null;
let s3phase   = 'tournament';
let revLeft   = null, revRight = null;
let placed    = new Map();
let pendingCard = null;
let dragSrc   = null;

/* ════════════════════════════════════════════
   DOM REFS
════════════════════════════════════════════ */
const intro        = document.getElementById('intro');
const app          = document.getElementById('app');
const content      = document.getElementById('content');
const progressFill = document.getElementById('progressFill');
const countNum     = document.getElementById('countNum');
const countDenom   = document.getElementById('countDenom');
const footerMsg    = document.getElementById('footerMsg');
const nextBtn      = document.getElementById('nextBtn');
const limitMsg     = document.getElementById('limitMsg');
const hint         = document.getElementById('hint');
const backBtn      = document.getElementById('backBtn');
const dots         = document.querySelectorAll('.dot');
const bannerLabel  = document.getElementById('bannerLabel');
const bannerText   = document.getElementById('bannerText');

let limitTimer = null;
const MAX = 24, TARGET = 12;

/* ════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════ */
function setBanner(lbl, html) {
    bannerLabel.textContent = lbl;
    bannerText.innerHTML    = html;
}

function setBack(show) { backBtn.classList.toggle('hidden', !show); }

function setFooter({ n, denom, msg = '', btnText, btnDisabled, hintText }) {
    countNum.textContent = n;
    countNum.classList.toggle('complete', btnDisabled === false);
    countDenom.textContent = denom;
    footerMsg.textContent  = msg;
    nextBtn.textContent    = btnText;
    nextBtn.disabled       = btnDisabled;
    hint.textContent       = hintText;
    limitMsg.textContent   = '';
}

function showLimit() {
    limitMsg.textContent = 'Maximum 24 reached — remove one first.';
    clearTimeout(limitTimer);
    limitTimer = setTimeout(() => limitMsg.textContent = '', 2500);
}

function promptCustom(id) {
    const val = window.prompt('Name for this card:', customLabels.get(id) || '');
    if (val === null) return;
    const t = val.trim();
    if (t) customLabels.set(id, t);
    else { customLabels.delete(id); selected.delete(id); }
    if (step === 1) renderStep1();
}

/* ════════════════════════════════════════════
   START
════════════════════════════════════════════ */
document.getElementById('startBtn').addEventListener('click', () => {
    intro.classList.add('hidden');
    app.classList.remove('hidden');
    renderStep1();
});

/* ════════════════════════════════════════════
   STEP 1 — Pick 24
════════════════════════════════════════════ */
function renderStep1() {
    setBanner('Step 1 of 4', 'Select <strong>24 values</strong> that feel most true to who you are and how you want to show up.');
    setBack(false);
    const n = selected.size;
    progressFill.style.width = `${(n / MAX) * 100}%`;
    setFooter({
        n, denom: '/ 24',
        msg: n === 0 ? '' : n < MAX ? `— ${MAX - n} more to go` : '— ready!',
        btnText: 'Continue to Step 2 →',
        btnDisabled: n !== MAX,
        hintText: n === MAX ? 'Tap any selected value to swap it out' : 'Tap a value to select it'
    });

    const grid = document.createElement('div');
    grid.className = 'chips-grid';

    VALUES.forEach(v => {
        const c = document.createElement('div');
        c.className = 'chip chip-anim' + (selected.has(v) ? ' selected' : '');
        c.textContent = v;
        c.addEventListener('click', () => {
            if (selected.has(v)) { selected.delete(v); }
            else {
                if (selected.size >= MAX) { showLimit(); return; }
                selected.add(v);
            }
            limitMsg.textContent = '';
            renderStep1();
        });
        grid.appendChild(c);
    });

    CUSTOM_IDS.forEach(id => {
        const lbl = customLabels.get(id);
        const c = document.createElement('div');
        if (!lbl) {
            c.className = 'chip chip-anim add-custom';
            c.innerHTML = '✏ Add';
            c.addEventListener('click', () => promptCustom(id));
        } else {
            c.className = 'chip chip-anim' + (selected.has(id) ? ' selected' : '');
            c.textContent = lbl;
            const btn = document.createElement('button');
            btn.className = 'chip-edit';
            btn.textContent = '✏';
            btn.addEventListener('click', e => { e.stopPropagation(); promptCustom(id); });
            c.appendChild(btn);
            c.addEventListener('click', e => {
                if (e.target === btn) return;
                if (selected.has(id)) { selected.delete(id); }
                else {
                    if (selected.size >= MAX) { showLimit(); return; }
                    selected.add(id);
                }
                renderStep1();
            });
        }
        grid.appendChild(c);
    });

    content.innerHTML = '';
    content.appendChild(grid);
}

/* ════════════════════════════════════════════
   STEP 2 — Keep 12
════════════════════════════════════════════ */
function goToStep2() {
    step = 2;
    kept = new Set([...selected]);
    discarded = new Set();
    dots[1].classList.add('active');
    renderStep2();
}

function renderStep2() {
    setBanner('Step 2 of 4', 'Discard <strong>12 values</strong> you\'re willing to give up to keep the other 12.');
    setBack(true);
    const n = kept.size;
    const toRemove = n - TARGET;
    progressFill.style.width = `${(discarded.size / TARGET) * 100}%`;
    countNum.textContent = n;
    countNum.classList.toggle('complete', n === TARGET);
    countDenom.textContent = '/ 12';
    nextBtn.textContent = 'Continue to Step 3 →';
    nextBtn.disabled = n !== TARGET;
    limitMsg.textContent = '';
    footerMsg.textContent = toRemove > 0 ? `— remove ${toRemove} more` : n === TARGET ? '— ready!' : `— restore ${TARGET - n}`;
    hint.textContent = n === TARGET ? 'Tap any to swap kept ↔ discarded' : 'Tap a value to discard it';

    const grid = document.createElement('div');
    grid.className = 'chips-grid';

    allValues().forEach(v => {
        const isKept = kept.has(v);
        const isDisc = discarded.has(v);
        if (!isKept && !isDisc) return;
        const c = document.createElement('div');
        c.className = 'chip chip-anim' + (isKept ? ' selected' : ' discarded');
        c.textContent = label(v);
        c.addEventListener('click', () => {
            if (isKept) { kept.delete(v); discarded.add(v); }
            else { discarded.delete(v); kept.add(v); }
            renderStep2();
        });
        grid.appendChild(c);
    });

    content.innerHTML = '';
    content.appendChild(grid);
}

/* ════════════════════════════════════════════
   STEP 3 — Tournament to 6
════════════════════════════════════════════ */
function goToStep3() {
    step = 3;
    pool = allValues().filter(v => kept.has(v));
    finalists = new Set();
    s3phase = 'tournament';
    pairA = pool.shift();
    pairB = pool.shift();
    revLeft = revRight = null;
    dots[2].classList.add('active');
    countDenom.textContent = '/ 6';
    nextBtn.textContent = 'Continue to Step 4 →';
    nextBtn.disabled = true;
    renderStep3();
}

function renderStep3() {
    const n = finalists.size;
    countNum.textContent = n;
    countNum.classList.toggle('complete', n === 6);
    progressFill.style.width = `${(n / 6) * 100}%`;
    limitMsg.textContent = '';
    s3phase === 'tournament' ? drawTournament() : drawReview();
}

function makeCmpCard(v) {
    const el = document.createElement('div');
    el.className = 'cmp-card';
    el.innerHTML = `
        <div class="cmp-inner"></div>
        <span class="cmp-corner tl">◆</span>
        <span class="cmp-name">${label(v)}</span>
        <span class="cmp-corner br">◆</span>
    `;
    return el;
}

function drawTournament() {
    setBanner('Step 3 of 4', 'Which value is <strong>more important</strong> to you? Tap your choice.');
    setBack(true);
    nextBtn.disabled = true;
    footerMsg.textContent = `— ${6 - finalists.size} more to find`;
    hint.textContent = 'Tap the value that matters more to you';

    const wrap = document.createElement('div');
    wrap.className = 'compare-screen';

    // Pair
    const pair = document.createElement('div');
    pair.className = 'compare-pair';
    const cA = makeCmpCard(pairA);
    const vs = document.createElement('div');
    vs.className = 'cmp-vs';
    vs.textContent = 'vs';
    const cB = makeCmpCard(pairB);
    cA.addEventListener('click', () => pickWinner(pairA, pairB));
    cB.addEventListener('click', () => pickWinner(pairB, pairA));
    pair.append(cA, vs, cB);
    wrap.appendChild(pair);

    // Waiting pool
    const waiting = allValues().filter(v => pool.includes(v));
    if (waiting.length > 0) {
        const lbl = document.createElement('div');
        lbl.className = 'section-label';
        lbl.style.width = '100%';
        lbl.style.maxWidth = '380px';
        lbl.textContent = `Waiting (${waiting.length})`;
        const pills = document.createElement('div');
        pills.className = 'pill-group';
        waiting.forEach(v => {
            const p = document.createElement('div');
            p.className = 'pill';
            p.textContent = label(v);
            pills.appendChild(p);
        });
        wrap.append(lbl, pills);
    }

    // Finalists so far
    if (finalists.size > 0) {
        const lbl2 = document.createElement('div');
        lbl2.className = 'section-label';
        lbl2.style.cssText = 'width:100%;max-width:380px;margin-top:16px;';
        lbl2.textContent = `Your ${finalists.size} so far`;
        const fins = document.createElement('div');
        fins.className = 'pill-group';
        allValues().forEach(v => {
            if (!finalists.has(v)) return;
            const p = document.createElement('div');
            p.className = 'pill finalist';
            p.textContent = label(v);
            fins.appendChild(p);
        });
        wrap.append(lbl2, fins);
    }

    content.innerHTML = '';
    content.appendChild(wrap);
}

function pickWinner(winner, loser) {
    finalists.add(winner);
    pool.push(loser);
    if (finalists.size === 6) {
        s3phase = 'review';
        pairA = pairB = null;
        revLeft = revRight = null;
    } else {
        pairA = pool.shift();
        pairB = pool.shift();
    }
    renderStep3();
}

function drawReview() {
    setBack(true);

    if (revLeft !== null && revRight !== null) {
        // Active swap comparison
        setBanner('Step 3 of 4', 'Which value matters <strong>more</strong>? The winner stays in your 6.');
        nextBtn.disabled = true;
        footerMsg.textContent = '';
        hint.textContent = 'Winner stays; loser returns to the pool';

        const wrap = document.createElement('div');
        wrap.className = 'compare-screen';
        const pair = document.createElement('div');
        pair.className = 'compare-pair';
        const cL = makeCmpCard(revLeft);
        const vs = document.createElement('div');
        vs.className = 'cmp-vs';
        vs.textContent = 'vs';
        const cR = makeCmpCard(revRight);
        cL.addEventListener('click', () => {
            pool = pool.filter(v => v !== revLeft);
            finalists.delete(revRight);
            finalists.add(revLeft);
            pool.push(revRight);
            revLeft = revRight = null;
            renderStep3();
        });
        cR.addEventListener('click', () => { revLeft = revRight = null; renderStep3(); });
        pair.append(cL, vs, cR);
        wrap.appendChild(pair);
        content.innerHTML = '';
        content.appendChild(wrap);

    } else {
        // Review overview
        setBanner('Step 3 of 4', 'Happy with your 6? Tap one from each group to compare and swap. Click <strong>Continue</strong> when satisfied.');
        nextBtn.disabled = false;
        footerMsg.textContent = '— your top 6';
        hint.textContent = 'Select from each group to compare, or continue';

        const wrap = document.createElement('div');
        wrap.className = 'compare-screen';

        // Finalists
        const finLabel = document.createElement('div');
        finLabel.className = 'section-label';
        finLabel.style.cssText = 'width:100%;max-width:380px;';
        finLabel.textContent = 'Your 6 values';
        const finGroup = document.createElement('div');
        finGroup.className = 'pill-group';
        allValues().forEach(v => {
            if (!finalists.has(v)) return;
            const p = document.createElement('div');
            p.className = 'pill finalist' + (revRight === v ? ' ring' : '');
            p.textContent = label(v);
            p.addEventListener('click', () => { revRight = revRight === v ? null : v; renderStep3(); });
            finGroup.appendChild(p);
        });
        wrap.append(finLabel, finGroup);

        // Pool
        const poolCards = allValues().filter(v => pool.includes(v));
        if (poolCards.length > 0) {
            const poolLabel = document.createElement('div');
            poolLabel.className = 'section-label';
            poolLabel.style.cssText = 'width:100%;max-width:380px;margin-top:18px;';
            poolLabel.textContent = 'Other values';
            const poolGroup = document.createElement('div');
            poolGroup.className = 'pill-group';
            poolCards.forEach(v => {
                const p = document.createElement('div');
                p.className = 'pill selectable' + (revLeft === v ? ' ring' : '');
                p.textContent = label(v);
                p.addEventListener('click', () => { revLeft = revLeft === v ? null : v; renderStep3(); });
                poolGroup.appendChild(p);
            });
            wrap.append(poolLabel, poolGroup);
        }

        content.innerHTML = '';
        content.appendChild(wrap);
    }
}

/* ════════════════════════════════════════════
   STEP 4 — Pyramid
════════════════════════════════════════════ */
function goToStep4() {
    step = 4;
    placed = new Map();
    pendingCard = null;
    dragSrc = null;
    dots[3].classList.add('active');
    countDenom.textContent = '/ 6';
    nextBtn.textContent = 'Done ✓';
    nextBtn.disabled = true;
    renderStep4();
}

function renderStep4() {
    setBanner('Step 4 of 4', 'Place your 6 values. <strong>Most important</strong> goes at the top. Tap to select then place, or drag and drop.');
    setBack(true);

    const n = placed.size;
    countNum.textContent = n;
    countNum.classList.toggle('complete', n === 6);
    progressFill.style.width = `${(n / 6) * 100}%`;
    nextBtn.disabled = n < 6;
    limitMsg.textContent = '';
    footerMsg.textContent = pendingCard ? `— tap a slot to place "${label(pendingCard)}"` : n < 6 ? '' : '— all placed!';
    hint.textContent = pendingCard
        ? 'Tap an occupied slot to swap'
        : n < 6 ? 'Tap a value to select it, then tap a slot' : 'Tap Done when your pyramid is complete';

    const placedVals = new Set(placed.values());
    const unplaced   = allValues().filter(v => finalists.has(v) && !placedVals.has(v));
    const wrap       = document.createElement('div');

    // Unplaced value pills
    if (unplaced.length > 0) {
        const secLabel = document.createElement('div');
        secLabel.className = 'section-label';
        secLabel.textContent = 'Select a value';
        const group = document.createElement('div');
        group.className = 'unplaced-group';
        unplaced.forEach(v => {
            const p = document.createElement('div');
            p.className = 'unplaced-pill' + (pendingCard === v ? ' ring' : '');
            p.textContent = label(v);
            p.draggable = true;
            p.addEventListener('click', () => { pendingCard = pendingCard === v ? null : v; renderStep4(); });
            p.addEventListener('dragstart', e => { dragSrc = { type: 'unplaced', value: v }; e.dataTransfer.effectAllowed = 'move'; pendingCard = null; });
            group.appendChild(p);
        });
        wrap.append(secLabel, group);
    }

    // Pyramid
    const pyrSection = document.createElement('div');
    pyrSection.className = 'pyramid-section';
    const pyrLabel = document.createElement('div');
    pyrLabel.className = 'section-label';
    pyrLabel.textContent = unplaced.length === 0 ? 'Your pyramid' : 'Then place it here';
    const pyr = document.createElement('div');
    pyr.className = 'pyramid';
    [[0],[1,2],[3,4,5]].forEach(indices => {
        const row = document.createElement('div');
        row.className = 'pyr-row';
        indices.forEach(i => row.appendChild(makeSlot(i)));
        pyr.appendChild(row);
    });
    pyrSection.append(pyrLabel, pyr);
    wrap.appendChild(pyrSection);

    content.innerHTML = '';
    content.appendChild(wrap);
}

function makeSlot(index) {
    const placedVal = placed.get(index);
    const el = document.createElement('div');

    if (placedVal !== undefined) {
        el.className = `pyr-slot has-card${pendingCard ? ' swap-ready' : ''}`;
        el.innerHTML = `
            <div class="pyr-inner"></div>
            <span class="pyr-corner tl">◆</span>
            <span class="pyr-name">${label(placedVal)}</span>
            <span class="pyr-corner br">◆</span>
        `;
        el.draggable = true;
        el.addEventListener('click', () => {
            if (pendingCard) { placed.set(index, pendingCard); pendingCard = placedVal; }
            else { placed.delete(index); pendingCard = placedVal; }
            renderStep4();
        });
        el.addEventListener('dragstart', e => { dragSrc = { type: 'slot', index, value: placedVal }; e.dataTransfer.effectAllowed = 'move'; pendingCard = null; });
    } else {
        el.className = `pyr-slot${pendingCard ? ' pending-target' : ''}`;
        el.innerHTML = `<span class="pyr-slot-num">${index + 1}</span>`;
        el.addEventListener('click', () => {
            if (pendingCard) { placed.set(index, pendingCard); pendingCard = null; renderStep4(); }
        });
    }

    el.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; el.classList.add('drag-over'); });
    el.addEventListener('dragleave', e => { if (!el.contains(e.relatedTarget)) el.classList.remove('drag-over'); });
    el.addEventListener('drop', e => {
        e.preventDefault();
        el.classList.remove('drag-over');
        if (!dragSrc) return;
        const incoming = dragSrc.value;
        if (dragSrc.type === 'unplaced') {
            placed.set(index, incoming);
        } else {
            const srcIdx = dragSrc.index;
            if (srcIdx === index) { dragSrc = null; return; }
            if (placedVal !== undefined) { placed.set(srcIdx, placedVal); placed.set(index, incoming); }
            else { placed.delete(srcIdx); placed.set(index, incoming); }
        }
        dragSrc = null; pendingCard = null; renderStep4();
    });

    return el;
}

/* ════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════ */
backBtn.addEventListener('click', () => {
    if (step === 2) { step = 1; dots[1].classList.remove('active'); renderStep1(); }
    else if (step === 3) { step = 2; dots[2].classList.remove('active'); renderStep2(); }
    else if (step === 4) { step = 3; dots[3].classList.remove('active'); renderStep3(); }
});

nextBtn.addEventListener('click', () => {
    if      (step === 1) goToStep2();
    else if (step === 2) goToStep3();
    else if (step === 3) goToStep4();
    else if (step === 4) {
        const order = [...placed.entries()].sort(([a],[b]) => a - b).map(([,v]) => label(v));

        setBanner('Complete', 'Your values journey is complete.');
        setBack(false);
        progressFill.style.width = '100%';
        countNum.textContent = '6';
        countNum.classList.add('complete');
        footerMsg.textContent = '';
        hint.textContent = 'Your values journey is complete.';
        nextBtn.style.display = 'none';

        const comp = document.createElement('div');
        comp.className = 'completion';

        const title = document.createElement('div');
        title.className = 'completion-title';
        title.textContent = 'What matters most to you';

        const list = document.createElement('div');
        list.className = 'completion-list';
        order.forEach((v, i) => {
            const item = document.createElement('div');
            item.className = 'completion-item';
            item.innerHTML = `<span class="completion-rank">${i + 1}</span><span class="completion-value">${v}</span>`;
            list.appendChild(item);
        });

        comp.append(title, list);
        content.innerHTML = '';
        content.appendChild(comp);
    }
});
</script>
</body>
</html>
